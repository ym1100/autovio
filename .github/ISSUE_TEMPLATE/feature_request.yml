name: Feature Request
description: Suggest an idea or improvement for AutoVio
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make AutoVio better? Describe it below. Be as specific as possible — the more detail you provide, the easier it is to evaluate and implement.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into.
      placeholder: "I'm trying to do X but the current pipeline only supports Y..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Pipeline / Workflow"
        - "AI Providers"
        - "Editor / Timeline"
        - "Export"
        - "Templates / Assets"
        - "Projects & Works API"
        - "MCP Server"
        - "Documentation"
        - "Developer Experience"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, examples, or anything else that helps explain the request.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I would be willing to contribute this feature via a pull request
